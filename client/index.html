<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Telephony Agent - API Platform</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header class="app-header">
            <h1>AI Voice Platform</h1>
            <button id="logout-btn" class="hidden">Logout</button>
        </header>

        <div id="alert-box" class="hidden"></div>

        <section id="login-view" class="section">
            <h3>Login</h3>
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Email Address" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit">Sign In</button>
            </form>
            <p>Don't have an account? <a href="#" id="show-register">Register here</a></p>
        </section>

        <section id="register-view" class="section hidden">
            <h3>Create Account</h3>
            <form id="register-form">
                <input type="email" id="register-email" placeholder="Email Address" required>
                <input type="password" id="register-password" placeholder="Password" required>
                <button type="submit">Register</button>
            </form>
            <p>Already have an account? <a href="#" id="show-login">Login here</a></p>
        </section>

        <section id="user-view" class="section hidden">
            <h3>User Dashboard</h3>
            <p>Welcome back! Here is your API usage:</p>
            <div class="stats-card">
                <h4>API Calls Remaining</h4>
                <p id="api-quota-display" class="quota-number">...</p>
            </div>
            <button id="test-api-btn">Test AI Endpoint (Consumes 1 call)</button>
            <div id="response-area"></div>
        </section>

        <section id="admin-view" class="section hidden">
            <h3>Admin Dashboard</h3>
            <p>System Overview & User Management</p>
            <div class="stats-card response-success">
                <h4>System Status</h4>
                <p>All microservices operational.</p>
            </div>
            </section>
    </div>

    <script src="js/client.js"></script>
</body>
</html>
